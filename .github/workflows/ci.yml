name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format
      - run: pnpm test:coverage
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: game-dist
          path: packages/game/dist
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # External review 2026-07 finding 1: a content/sim PR can silently break the
  # economy since the balance harness only ran locally. Path-filtered (not
  # every push) since a 1000-career-per-strategy run takes real minutes and
  # only sim/content-data changes can affect its output.
  balance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect sim/content changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.event.pull_request.base.ref }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if git diff --name-only "$BASE" HEAD 2>/dev/null | grep -qE '^(packages/sim/|packages/content/data/)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: pnpm/action-setup@v4
        if: steps.filter.outputs.changed == 'true'
      - uses: actions/setup-node@v4
        if: steps.filter.outputs.changed == 'true'
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        if: steps.filter.outputs.changed == 'true'
        with:
          python-version: '3.11'
      - run: pnpm install --frozen-lockfile
        if: steps.filter.outputs.changed == 'true'
      - run: pip install -e tools/balance
        if: steps.filter.outputs.changed == 'true'
      - run: pnpm balance:run
        if: steps.filter.outputs.changed == 'true'
      - run: python -m balance.cli report --data-dir tools/balance/data --out tools/balance/report.md
        if: steps.filter.outputs.changed == 'true'
      - run: python -m balance.cli check --data-dir tools/balance/data
        if: steps.filter.outputs.changed == 'true'
      - uses: actions/upload-artifact@v4
        if: steps.filter.outputs.changed == 'true'
        with:
          name: balance-report
          path: tools/balance/report.md

  deploy:
    needs: [check, balance]
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.check.result == 'success' &&
      (needs.balance.result == 'success' || needs.balance.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Secrets are added by the user in repo settings; the step is skipped
      # (not failed) until they exist so CI stays green pre-Cloudflare.
      - name: Check for Cloudflare credentials
        id: cf
        run: echo "configured=${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}" >> "$GITHUB_OUTPUT"
      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/game/dist --project-name=midnight-garage

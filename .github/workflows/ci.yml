name: CI

# Sprint 82 decision 9 (maintainer directive 2026-07-17: "kill github ci just
# run local"): the local pre-push hook is the quality gate now. The old check
# and balance jobs are gone; only the deploy job remains, so CI runs only on a
# push to main (a pull_request would spin up zero jobs).
on:
  push:
    branches: [main]

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Secrets are added by the user in repo settings; the step is skipped
      # (not failed) until they exist so CI stays green pre-Cloudflare.
      - name: Check for Cloudflare credentials
        id: cf
        run: echo "configured=${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}" >> "$GITHUB_OUTPUT"
      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/game/dist --project-name=midnight-garage
